name: Lint to the Future diff check

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  lttf-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0
      - uses: njoyard/lttf-diff@90def954db26db5a358fb7e90383641fa8d9182d
        with:
          cache: pnpm